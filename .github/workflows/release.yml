name: Release to npm

# Fires when a GitHub Release is published (NOT on plain tag pushes — we
# want explicit human approval via the Releases UI). Tag format: vX.Y.Z.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry-run (npm publish --dry-run)"
        required: false
        default: "false"

permissions:
  contents: read
  # `id-token: write` would be required for `npm publish --provenance`,
  # but provenance only works when the source repo is PUBLIC. This repo
  # is private; if it goes public, re-add `id-token: write` here AND
  # the `--provenance` flag to both publish steps below.

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org/"
          always-auth: true

      - name: Install
        run: npm ci

      - name: Verify version matches tag
        if: github.event_name == 'release'
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG" ]; then
            echo "::error::package.json version ($PKG_VERSION) doesn't match git tag ($TAG)"
            exit 1
          fi
          echo "Version $PKG_VERSION matches tag v$TAG"

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: npm pack (verify contents)
        run: npm pack --dry-run

      - name: Publish (dry-run)
        if: inputs.dry_run == 'true'
        run: npm publish --dry-run --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish
        if: github.event_name == 'release' && inputs.dry_run != 'true'
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
